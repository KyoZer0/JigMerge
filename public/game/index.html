<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JigMerge</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
</head>

<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="main-menu">
            <div class="menu-top">
                <div class="coin-counter wood-panel-small">
                    <span class="coin-icon">
                        <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                            stroke="var(--wood-dark)" stroke-width="2" stroke-linejoin="round">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                            </polygon>
                        </svg>
                    </span>
                    <span id="coin-amount">0</span>
                </div>
                <h1 class="game-title wood-text">JigMerge</h1>
            </div>

            <div class="menu-center">
                <div class="menu-graphic wood-panel">
                    <!-- Decorative puzzle outline -->
                </div>
                <button id="start-btn" class="wood-btn large">PLAY</button>
            </div>

            <div class="menu-bottom">
                <button class="wood-btn small">SHOP</button>
                <button class="wood-btn small active">HOME</button>
                <button id="settings-btn" class="wood-btn small icon">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Shop Modal -->
        <div id="shop-overlay" class="hidden fullscreen-overlay">
            <div class="wood-panel modal-content">
                <h2 class="wood-text">SHOP (Coming Soon)</h2>
                <p style="display: flex; align-items: center; justify-content: center; gap: 5px;">
                    Spend your
                    <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                        stroke="var(--wood-dark)" stroke-width="2" stroke-linejoin="round"
                        style="width: 20px; height: 20px;">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    here!
                </p>
                <div style="height: 50px;"></div>
                <button id="close-shop-btn" class="wood-btn small">CLOSE</button>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-overlay" class="hidden fullscreen-overlay">
            <div class="wood-panel modal-content">
                <h2 class="wood-text">SETTINGS</h2>
                <div class="settings-options" style="margin: 20px 0;">
                    <button id="toggle-sound-btn" class="wood-btn small">SOUND: ON</button>
                </div>
                <button id="close-settings-btn" class="wood-btn small">CLOSE</button>
            </div>
        </div>

        <!-- Level Select Screen -->
        <div id="level-select-screen" class="hidden">
            <div class="menu-top">
                <button id="back-to-main-btn" class="wood-btn small icon">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h2 class="wood-text" style="font-size: 32px;">LEVELS</h2>
            </div>
            <div class="level-grid" id="level-grid">
                <!-- Level buttons injected by JS -->
            </div>
        </div>

        <!-- Top UI Bar for Game Board -->
        <header id="game-header" class="hidden">
            <div class="header-left">
                <button id="pause-btn" class="wood-btn icon small">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </button>
            </div>
            <div class="header-center">
                <div class="level-info wood-text">Level <span id="level-display">1</span></div>
            </div>
            <div class="header-right"></div>
        </header>

        <!-- Main Board -->
        <main id="board" class="hidden">
            <!-- Puzzle pieces will be injected here -->
        </main>

        <!-- Memorize Overlay -->
        <div id="memorize-overlay" class="hidden fullscreen-overlay">
            <h2 class="bubbly-text">MEMORIZE</h2>
        </div>

        <!-- Win Overlay -->
        <div id="win-overlay" class="hidden">
            <div class="win-modal wood-panel">
                <h2 class="wood-text">Level Complete!</h2>
                <div class="stars stars-svg">
                    <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                        stroke="var(--wood-dark)" stroke-width="2" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                        stroke="var(--wood-dark)" stroke-width="2" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                        stroke="var(--wood-dark)" stroke-width="2" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                </div>
                <button id="next-level-btn" class="wood-btn large">NEXT LEVEL</button>
            </div>
        </div>
    </div>

    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="game.js"></script>
</body>

</html>
